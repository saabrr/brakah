/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;padding:calc(env(safe-area-inset-top)+10px) 14px 10px;background:rgba(13,17,23,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.topbar-left{display:flex;align-items:center;gap:8px;min-width:0;}
.logo{width:30px;height:30px;border-radius:8px;background:var(--reg);display:grid;place-items:center;flex-shrink:0;transition:background .3s;}
.logo svg{width:15px;height:15px;}
.app-name{font-family:var(--display);font-size:15px;font-weight:800;letter-spacing:-.1px;white-space:nowrap;}
.reg-switcher{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:3px;gap:2px;flex-shrink:0;}
.reg-btn{padding:6px 12px;border-radius:7px;border:none;background:none;color:var(--muted2);font-family:var(--display);font-size:12px;font-weight:800;cursor:pointer;transition:background .18s,color .18s;white-space:nowrap;letter-spacing:.2px;}
.reg-btn.active{background:var(--reg);color:#061408;transition:background .3s,color .2s;}
.bank-row{display:flex;align-items:center;gap:6px;padding:6px 9px 6px 11px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;flex-shrink:0;}
.bank-row label{font-size:11px;font-weight:600;color:var(--muted2);white-space:nowrap;}
.bank-row input{width:64px;background:rgba(0,0,0,.35);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--body);font-size:14px;font-weight:700;text-align:center;padding:4px 5px;outline:none;transition:border-color .15s,box-shadow .15s;}
.bank-row input:focus{border-color:var(--reg);box-shadow:0 0 0 3px var(--reg-dim);}
.reg-strip{height:3px;background:linear-gradient(90deg,var(--reg),var(--reg2));transition:background .3s;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 14px;}
.tab{flex:1;padding:10px 0;border:none;background:none;color:var(--muted2);font-family:var(--body);font-size:13px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .18s,border-color .18s;display:flex;align-items:center;justify-content:center;gap:5px;}
.tab.active{color:var(--reg2);border-bottom-color:var(--reg2);transition:color .3s,border-color .3s;}
.panel{display:none;padding:0 14px;}
.panel.active{display:block;}

/* HERO */
.hero{margin:12px 0 10px;display:grid;grid-template-columns:1fr 1fr;border-radius:16px;overflow:hidden;border:1px solid var(--border);background:var(--surface);}
.hero-cell{padding:14px 15px 12px;}
.hero-cell:first-child{border-right:1px solid var(--border);}
.hero-label{font-size:10px;font-weight:700;letter-spacing:.55px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.hero-val{font-family:var(--display);font-size:27px;font-weight:800;letter-spacing:-.4px;font-variant-numeric:tabular-nums;line-height:1;color:var(--text);transition:color .3s;}
.hero-val.is-over{color:var(--green2);}
.hero-val.is-short{color:var(--red);}
.hero-val.is-exact{color:#E3B341;}
.status-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;margin-top:6px;width:fit-content;}
.pill-over{background:var(--green-dim);color:var(--green2);border:1px solid rgba(63,185,80,.22);}
.pill-short{background:var(--red-dim);color:#FF8F8A;border:1px solid rgba(248,81,73,.20);}
.pill-exact{background:var(--gold-dim);color:#E3B341;border:1px solid rgba(210,153,34,.28);}

/* SECTION */
.sec{margin-bottom:8px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:10px 4px 7px;}
.sec-title{font-family:var(--display);font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--muted2);}
.sec-sum{font-size:12px;font-weight:700;color:var(--reg2);font-variant-numeric:tabular-nums;transition:color .3s;}

/* ROWS */
.row-list{border-radius:13px;overflow:hidden;border:1px solid var(--border);}

/* Each denom is wrapped so quick-add sits inside the card */
.drow-wrap{background:var(--surface);border-bottom:1px solid var(--border);}
.drow-wrap:last-child{border-bottom:none;}

.drow{display:flex;align-items:center;padding:0 11px 0 13px;min-height:52px;gap:9px;transition:background .14s;}
.drow-wrap:focus-within{background:var(--surface2);}
.denom-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.chip{min-width:40px;height:23px;border-radius:6px;display:grid;place-items:center;font-size:10px;font-weight:800;font-variant-numeric:tabular-nums;background:rgba(255,255,255,.05);color:var(--muted2);flex-shrink:0;}
.dname{font-size:13px;font-weight:600;color:var(--text);}
.dhint{font-size:11px;color:var(--muted);font-weight:500;}
.stepgroup{display:flex;align-items:center;background:rgba(0,0,0,.35);border:1px solid var(--border2);border-radius:10px;overflow:hidden;flex-shrink:0;}
.step{width:34px;height:36px;border:none;background:none;color:var(--muted2);font-size:20px;font-weight:300;cursor:pointer;display:grid;place-items:center;transition:background .1s,color .1s;user-select:none;-webkit-user-select:none;}
.step:active{background:var(--reg-dim);color:var(--reg2);}
.dinput{width:46px;border:none;background:none;outline:none;color:var(--text);font-family:var(--body);font-size:15px;font-weight:700;text-align:center;padding:0;font-variant-numeric:tabular-nums;}
.dinput::-webkit-inner-spin-button,.dinput::-webkit-outer-spin-button{-webkit-appearance:none;}
.dinput[type=number]{-moz-appearance:textfield;}
.val-hint{min-width:38px;font-size:11px;font-weight:600;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums;flex-shrink:0;}

/* QUICK-ADD ROW */
.quick-row{display:flex;gap:5px;padding:0 11px 8px 13px;}
.qadd{
  flex:1;padding:5px 2px;border-radius:7px;
  background:rgba(255,255,255,.04);border:1px solid var(--border2);
  color:var(--muted2);font-family:var(--body);font-size:11px;font-weight:800;
  cursor:pointer;transition:background .12s,color .12s,transform .1s;
  letter-spacing:.15px;
}
.qadd:active{background:var(--reg-dim);color:var(--reg2);transform:scale(.95);}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:40;padding:9px 14px calc(env(safe-area-inset-bottom)+9px);background:rgba(13,17,23,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;gap:8px;}
.btn-reset{padding:12px 15px;border-radius:11px;border:1px solid var(--border2);background:var(--surface);color:var(--muted2);font-family:var(--body);font-size:13px;font-weight:700;cursor:pointer;transition:background .14s,color .14s;white-space:nowrap;}
.btn-reset:active{background:var(--surface2);color:var(--text);}
.btn-save{flex:1;padding:12px;border-radius:11px;border:none;background:var(--reg);color:#061408;font-family:var(--display);font-size:14px;font-weight:800;cursor:pointer;transition:opacity .18s,transform .12s,background .3s,color .2s;letter-spacing:.1px;}
.btn-save:active{transform:scale(.98);}
.btn-save:disabled{opacity:.3;cursor:not-allowed;transform:none!important;}
.btn-save.saved{background:var(--surface2);color:var(--reg2);border:1px solid var(--reg-dim);}

/* HISTORY FILTER */
.hist-filter{display:flex;gap:5px;padding:12px 0 8px;}
.hfbtn{flex:1;padding:8px 4px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--muted2);font-family:var(--body);font-size:12px;font-weight:700;cursor:pointer;transition:background .18s,color .18s,border-color .18s;}
.hfbtn.active{background:var(--surface2);border-color:var(--border2);color:var(--text);}
.hfbtn.active.f-all{border-color:rgba(230,237,243,.22);color:var(--text);}
.hfbtn.active.f-r1{border-color:rgba(63,185,80,.35);color:var(--green2);background:rgba(63,185,80,.07);}
.hfbtn.active.f-r2{border-color:rgba(88,166,255,.35);color:var(--blue2);background:rgba(88,166,255,.07);}

/* COMBINED SUMMARY */
.combo-bar{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.combo-card{border-radius:12px;padding:11px 12px;}
.combo-card.c1{background:rgba(63,185,80,.07);border:1px solid rgba(63,185,80,.20);}
.combo-card.c2{background:rgba(88,166,255,.07);border:1px solid rgba(88,166,255,.20);}
.combo-label{font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px;}
.combo-label.c1{color:var(--green2);}
.combo-label.c2{color:var(--blue2);}
.combo-val{font-family:var(--display);font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;}
.combo-sub{font-size:10px;color:var(--muted);margin-top:2px;font-weight:600;}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:0 0 9px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 11px 9px;}
.stat-lbl{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:3px;}
.stat-val{font-family:var(--display);font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;}

/* HISTORY CARDS */
.hist-empty{text-align:center;padding:56px 24px;color:var(--muted);}
.hist-empty .ico{font-size:36px;margin-bottom:10px;}
.hist-empty p{font-size:14px;line-height:1.65;}
.hist-list{display:flex;flex-direction:column;gap:7px;}
.hcard{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px 13px;animation:fadeUp .2s ease;}
.hcard.short{border-color:rgba(248,81,73,.18);}
.hcard.exact{border-color:rgba(210,153,34,.26);}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.hcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:6px;}
.hcard-meta{display:flex;flex-direction:column;gap:4px;}
.hcard-date{font-size:12px;font-weight:600;color:var(--muted2);}
.reg-badge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.3px;padding:2px 7px;border-radius:999px;width:fit-content;}
.reg-badge.r1{background:rgba(63,185,80,.12);color:var(--green2);border:1px solid rgba(63,185,80,.22);}
.reg-badge.r2{background:rgba(88,166,255,.12);color:var(--blue2);border:1px solid rgba(88,166,255,.22);}
.hnums{display:flex;border-radius:9px;overflow:hidden;border:1px solid var(--border);margin-bottom:8px;}
.hnum{flex:1;padding:7px 8px;border-right:1px solid var(--border);}
.hnum:last-child{border-right:none;}
.hnum-lbl{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.hnum-val{font-family:var(--display);font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;}
.hdel{font-size:12px;font-weight:700;padding:5px 9px;border-radius:7px;border:1px solid rgba(248,81,73,.18);background:rgba(248,81,73,.07);color:rgba(248,81,73,.65);cursor:pointer;transition:background .14s,color .14s;}
.hdel:active{background:rgba(248,81,73,.14);color:var(--red);}
.hist-section-label{font-family:var(--display);font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:6px 2px 5px;margin-top:4px;}

.toast{position:fixed;bottom:calc(env(safe-area-inset-bottom)+80px);left:50%;transform:translateX(-50%) translateY(14px);opacity:0;z-index:200;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-size:13px;font-weight:700;padding:9px 18px;border-radius:999px;box-shadow:0 12px 40px rgba(0,0,0,.5);backdrop-filter:blur(18px);transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .22s ease;white-space:nowrap;pointer-events:none;}
.toast.on{transform:translateX(-50%) translateY(0);opacity:1;}

<script>
const $=id=>document.getElementById(id);
const fmt2=x=>(Math.round(x*100)/100).toFixed(2);
const fmtD=x=>`$${fmt2(x)}`;
function getN(id){const v=parseFloat($(id).value);return Number.isFinite(v)&&v>=0?v:0;}

// ── denoms ──
const BILLS=[
  {id:'b100',label:'Hundreds',chip:'$100',val:100,quick:[5,10,20]},
  {id:'b50', label:'Fifties', chip:'$50', val:50, quick:[5,10,20]},
  {id:'b20', label:'Twenties',chip:'$20', val:20, quick:[5,10,20]},
  {id:'b10', label:'Tens',    chip:'$10', val:10, quick:[5,10,20]},
  {id:'b5',  label:'Fives',   chip:'$5',  val:5,  quick:[5,10,20]},
  {id:'b1',  label:'Ones',    chip:'$1',  val:1,  quick:[5,10,20]},
];
const COINS=[
  {id:'cq',label:'Quarters',chip:'25¢',val:.25},
  {id:'cd',label:'Dimes',   chip:'10¢',val:.10},
  {id:'cn',label:'Nickels', chip:'5¢', val:.05},
  {id:'cp',label:'Pennies', chip:'1¢', val:.01},
];
const ROLLS=[
  {id:'rq',label:'Quarter Rolls',hint:'$10 each',chip:'Q×40',val:10},
  {id:'rd',label:'Dime Rolls',   hint:'$5 each', chip:'D×50',val:5 },
  {id:'rn',label:'Nickel Rolls', hint:'$2 each', chip:'N×40',val:2 },
  {id:'rp',label:'Penny Rolls',  hint:'$0.50 ea',chip:'P×50',val:.50},
];
const ALL=[...BILLS,...COINS,...ROLLS];

// ── build rows ──
function buildRows(containerId,items,showQuick){
  const el=$(containerId); el.innerHTML='';
  items.forEach(it=>{
    const wrap=document.createElement('div');
    wrap.className='drow-wrap';
    let inner=`
      <div class="drow">
        <div class="denom-left">
          <div class="chip">${it.chip}</div>
          <div>
            <div class="dname">${it.label}</div>
            ${it.hint?`<div class="dhint">${it.hint}</div>`:''}
          </div>
        </div>
        <div class="stepgroup">
          <button class="step" data-a="dec" data-t="${it.id}">−</button>
          <input class="dinput" id="${it.id}" type="number" min="0" step="1" value="0" inputmode="numeric"/>
          <button class="step" data-a="inc" data-t="${it.id}">+</button>
        </div>
        <span class="val-hint" id="${it.id}v"></span>
      </div>`;
    if(showQuick && it.quick){
      inner+=`<div class="quick-row">
        ${it.quick.map(n=>`<button class="qadd" data-t="${it.id}" data-add="${n}">+${n}</button>`).join('')}
      </div>`;
    }
    wrap.innerHTML=inner;
    el.appendChild(wrap);
  });
}
buildRows('billList',BILLS,true);
buildRows('coinList',COINS,false);
buildRows('rollList',ROLLS,false);

// ── register state ──
let _reg=1;
function regKey(k){return`dc_${k}_r${_reg}`;}

function saveRegState(){
  const counts={};
  ALL.forEach(x=>counts[x.id]=parseFloat($(x.id).value)||0);
  localStorage.setItem(regKey('bank'),$('bank').value);
  localStorage.setItem(regKey('counts'),JSON.stringify(counts));
}

function loadRegState(){
  const bank=localStorage.getItem(regKey('bank'));
  $('bank').value=bank!==null?bank:'200';
  const raw=localStorage.getItem(regKey('counts'));
  if(raw){try{const c=JSON.parse(raw);ALL.forEach(x=>$(x.id).value=c[x.id]??0);}catch{ALL.forEach(x=>$(x.id).value=0);}}
  else ALL.forEach(x=>$(x.id).value=0);
}

// ── anim ──
const _anim=new Map();
function animTo(elId,to,fmt,dur=400){
  const el=$(elId);if(!el)return;
  const prev=_anim.get(elId);if(prev)cancelAnimationFrame(prev.raf);
  const from=prev?prev.cur:0;
  const t0=performance.now();
  const ease=t=>1-Math.pow(1-t,3);
  function tick(now){
    const t=Math.min(1,(now-t0)/dur);
    const cur=from+(to-from)*ease(t);
    el.textContent=fmt(cur);
    if(t<1){const raf=requestAnimationFrame(tick);_anim.set(elId,{raf,cur});}
    else _anim.set(elId,{raf:null,cur:to});
  }
  requestAnimationFrame(tick);
}

// ── compute ──
function compute(){
  const bills=BILLS.reduce((s,x)=>s+getN(x.id)*x.val,0);
  const coins=COINS.reduce((s,x)=>s+getN(x.id)*x.val,0);
  const rolls=ROLLS.reduce((s,x)=>s+getN(x.id)*x.val,0);
  return{bills,coins,rolls,total:bills+coins+rolls};
}

// ── update ──
let _canSave=false;
function update(){
  const{bills,coins,rolls,total}=compute();
  const bank=getN('bank');
  const raw=total-bank;
  const rounded=Math.round(raw);
  const isShort=raw<-.005,isExact=Math.abs(raw)<.005;

  $('sBills').textContent=fmtD(bills);
  $('sCoins').textContent=fmtD(coins);
  $('sRolls').textContent=fmtD(rolls);

  ALL.forEach(x=>{
    const v=getN(x.id)*x.val;
    const el=$(x.id+'v');if(el)el.textContent=v?fmtD(v):'';
  });

  animTo('hTotal',total,v=>`$${fmt2(v)}`);
  const dEl=$('hDrop'),bEl=$('hBadge');
  if(isExact){
    animTo('hDrop',0,()=>'$0',300);
    dEl.className='hero-val is-exact';
    bEl.className='status-pill pill-exact';
    bEl.textContent='✦ Exact!';
    launchConfetti();
  }else if(isShort){
    animTo('hDrop',rounded,v=>`-$${Math.abs(Math.round(v))}`);
    dEl.className='hero-val is-short';
    bEl.className='status-pill pill-short';
    bEl.textContent='⚠ Short';
  }else{
    animTo('hDrop',rounded,v=>`$${Math.round(v)}`);
    dEl.className='hero-val is-over';
    bEl.className='status-pill pill-over';
    bEl.textContent='● Over';
  }

  _canSave=total>0;
  const sb=$('btnSave');
  sb.disabled=!_canSave;
  if(sb.classList.contains('saved')){sb.classList.remove('saved');sb.textContent='Save Close';}
  saveRegState();
}

// ── switch register ──
function switchReg(r){
  if(r===_reg)return;
  saveRegState();
  _reg=r;
  document.body.dataset.reg=r;
  document.querySelectorAll('.reg-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.reg)===r));
  _anim.clear();
  loadRegState();
  update();
  const sb=$('btnSave');sb.classList.remove('saved');sb.textContent='Save Close';
  if($('panel-history').classList.contains('active'))renderH();
  toast(`Register ${r}`);
  if(navigator.vibrate)navigator.vibrate(15);
}
document.querySelectorAll('.reg-btn').forEach(b=>b.addEventListener('click',()=>switchReg(parseInt(b.dataset.reg))));

// ── steppers ──
document.addEventListener('click',e=>{
  const btn=e.target.closest('.step');
  if(btn){
    const inp=$(btn.dataset.t);if(!inp)return;
    let v=parseFloat(inp.value)||0;
    v=btn.dataset.a==='inc'?v+1:Math.max(0,v-1);
    inp.value=v;update();
    if(navigator.vibrate)navigator.vibrate(10);
    return;
  }
  // quick-add
  const qa=e.target.closest('.qadd');
  if(qa){
    const inp=$(qa.dataset.t);if(!inp)return;
    let v=parseFloat(inp.value)||0;
    v+=parseInt(qa.dataset.add);
    inp.value=v;update();
    if(navigator.vibrate)navigator.vibrate([8,4,8]);
  }
});

// ── inputs ──
document.querySelectorAll('.dinput,#bank').forEach(inp=>{
  inp.addEventListener('focus',()=>setTimeout(()=>inp.select(),30));
  inp.addEventListener('input',update);
});

// ── reset ──
$('btnReset').addEventListener('click',()=>{
  ALL.forEach(x=>$(x.id).value=0);
  update();toast('All cleared');
  if(navigator.vibrate)navigator.vibrate([18,8,18]);
});

// ── save ──
$('btnSave').addEventListener('click',()=>{
  if(!_canSave)return;
  const{total}=compute();
  const bank=getN('bank');
  const raw=total-bank;
  const entry={id:Date.now(),ts:new Date().toISOString(),reg:_reg,bank,total,raw,rounded:Math.round(raw),isShort:raw<-.005,isExact:Math.abs(raw)<.005};
  // save to register-specific key
  const h=loadHFor(_reg);h.unshift(entry);if(h.length>50)h.pop();saveHFor(_reg,h);
  const sb=$('btnSave');
  sb.classList.add('saved');sb.textContent='✓ Saved';sb.disabled=true;_canSave=false;
  toast(`Reg ${_reg} saved ✓`);
  if(navigator.vibrate)navigator.vibrate([25,12,25]);
});

// ── tabs ──
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    $(`panel-${t.dataset.tab}`).classList.add('active');
    $('bbar').style.display=t.dataset.tab==='history'?'none':'flex';
    if(t.dataset.tab==='history')renderH();
  });
});

// ── storage (per-register) ──
function loadHFor(r){try{return JSON.parse(localStorage.getItem(`dc_hist_r${r}`)||'[]');}catch{return[];}}
function saveHFor(r,h){localStorage.setItem(`dc_hist_r${r}`,JSON.stringify(h));}

// ── history filter state ──
let _histFilter='all';
document.querySelectorAll('.hfbtn').forEach(b=>{
  b.addEventListener('click',()=>{
    _histFilter=b.dataset.filter;
    document.querySelectorAll('.hfbtn').forEach(x=>{
      x.classList.remove('active');
    });
    b.classList.add('active');
    renderH();
    if(navigator.vibrate)navigator.vibrate(12);
  });
});

// ── date format ──
function fDate(iso){
  const d=new Date(iso),now=new Date();
  const time=d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  if(now.toDateString()===d.toDateString())return`Today · ${time}`;
  if(new Date(now-86400000).toDateString()===d.toDateString())return`Yesterday · ${time}`;
  return d.toLocaleDateString([],{month:'short',day:'numeric'})+` · ${time}`;
}

// ── render history ──
function renderH(){
  const el=$('histOut');

  // collect entries based on filter
  let entries=[];
  if(_histFilter==='all'){
    const h1=loadHFor(1).map(x=>({...x,reg:x.reg||1}));
    const h2=loadHFor(2).map(x=>({...x,reg:x.reg||2}));
    entries=[...h1,...h2].sort((a,b)=>b.id-a.id);
  } else {
    const r=parseInt(_histFilter);
    entries=loadHFor(r).map(x=>({...x,reg:r}));
  }

  if(!entries.length){
    const label=_histFilter==='all'?'either register':`Register ${_histFilter}`;
    el.innerHTML=`<div class="hist-empty"><div class="ico">📋</div><p>No closes saved for <b>${label}</b> yet.<br>Count the drawer and tap <b>Save Close</b>.</p></div>`;
    return;
  }

  let out='';

  // combined summary when showing all
  if(_histFilter==='all'){
    const h1=entries.filter(x=>x.reg===1);
    const h2=entries.filter(x=>x.reg===2);
    const drop1=h1.filter(x=>!x.isShort&&!x.isExact).reduce((s,x)=>s+x.rounded,0);
    const drop2=h2.filter(x=>!x.isShort&&!x.isExact).reduce((s,x)=>s+x.rounded,0);
    const short1=h1.filter(x=>x.isShort).length;
    const short2=h2.filter(x=>x.isShort).length;
    out+=`<div class="combo-bar">
      <div class="combo-card c1">
        <div class="combo-label c1">Register 1</div>
        <div class="combo-val">$${fmt2(drop1)}</div>
        <div class="combo-sub">${h1.length} close${h1.length!==1?'s':''} · ${short1} short</div>
      </div>
      <div class="combo-card c2">
        <div class="combo-label c2">Register 2</div>
        <div class="combo-val">$${fmt2(drop2)}</div>
        <div class="combo-sub">${h2.length} close${h2.length!==1?'s':''} · ${short2} short</div>
      </div>
    </div>`;

    // total dropped across both
    const totalDrop=drop1+drop2;
    const totalShorts=short1+short2;
    const avg=entries.reduce((s,x)=>s+x.total,0)/entries.length;
    out+=`<div class="stat-grid">
      <div class="stat-card"><span class="stat-lbl">Total Dropped</span><span class="stat-val" style="color:var(--green2)">$${fmt2(totalDrop)}</span></div>
      <div class="stat-card"><span class="stat-lbl">Avg Total</span><span class="stat-val">$${fmt2(avg)}</span></div>
      <div class="stat-card"><span class="stat-lbl">Short Nights</span><span class="stat-val" style="color:${totalShorts?'var(--red)':'var(--green2)'}">${totalShorts}</span></div>
    </div>`;
  } else {
    // single register stats
    const dropped=entries.filter(x=>!x.isShort&&!x.isExact).reduce((s,x)=>s+x.rounded,0);
    const shorts=entries.filter(x=>x.isShort).length;
    const avg=entries.reduce((s,x)=>s+x.total,0)/entries.length;
    const rClr=_histFilter==='1'?'var(--green2)':'var(--blue2)';
    out+=`<div style="padding:2px 2px 6px;font-family:var(--display);font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:${rClr};">Register ${_histFilter} · ${entries.length} close${entries.length!==1?'s':''}</div>`;
    out+=`<div class="stat-grid">
      <div class="stat-card"><span class="stat-lbl">Dropped</span><span class="stat-val" style="color:var(--green2)">$${fmt2(dropped)}</span></div>
      <div class="stat-card"><span class="stat-lbl">Avg Total</span><span class="stat-val">$${fmt2(avg)}</span></div>
      <div class="stat-card"><span class="stat-lbl">Short Nights</span><span class="stat-val" style="color:${shorts?'var(--red)':'var(--green2)'}">${shorts}</span></div>
    </div>`;
  }

  out+=`<div class="hist-list">`;
  entries.forEach(e=>{
    const cls=e.isShort?'short':e.isExact?'exact':'';
    const pCls=e.isShort?'pill-short':e.isExact?'pill-exact':'pill-over';
    const pTxt=e.isShort?'⚠ Short':e.isExact?'✦ Exact':'● Over';
    const dropTxt=e.isShort?`-$${fmt2(Math.abs(e.raw))}`:`$${e.rounded}`;
    const dropClr=e.isShort?'var(--red)':e.isExact?'var(--gold)':'var(--green2)';
    const regNum=e.reg||1;
    out+=`<div class="hcard ${cls}" data-reg="${regNum}" data-id="${e.id}">
      <div class="hcard-top">
        <div class="hcard-meta">
          <span class="hcard-date">${fDate(e.ts)}</span>
          <span class="reg-badge r${regNum}">Register ${regNum}</span>
        </div>
        <span class="status-pill ${pCls}">${pTxt}</span>
      </div>
      <div class="hnums">
        <div class="hnum"><div class="hnum-lbl">Total</div><div class="hnum-val">$${fmt2(e.total)}</div></div>
        <div class="hnum"><div class="hnum-lbl">Bank</div><div class="hnum-val">$${fmt2(e.bank)}</div></div>
        <div class="hnum"><div class="hnum-lbl">Drop</div><div class="hnum-val" style="color:${dropClr}">${dropTxt}</div></div>
      </div>
      <button class="hdel" data-reg="${regNum}" data-id="${e.id}">Delete</button>
    </div>`;
  });
  out+=`</div>`;
  el.innerHTML=out;

  el.querySelectorAll('.hdel').forEach(b=>{
    b.addEventListener('click',()=>{
      const r=parseInt(b.dataset.reg);
      const id=parseInt(b.dataset.id);
      saveHFor(r,loadHFor(r).filter(x=>x.id!==id));
      renderH();toast('Entry deleted');
      if(navigator.vibrate)navigator.vibrate(18);
    });
  });
}

// ── toast ──
let _tt=null;
function toast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('on');
  if(_tt)clearTimeout(_tt);
  _tt=setTimeout(()=>t.classList.remove('on'),2000);
}

// ── confetti ──
let _parts=[],_raf=null;
const cv=$('cv'),cx=cv.getContext('2d');
function launchConfetti(){
  cv.width=innerWidth;cv.height=innerHeight;
  const cols=['#3FB950','#56D364','#A7F3D0','#D29922','#E3B341','#E6EDF3','#58A6FF'];
  _parts=Array.from({length:75},()=>({x:Math.random()*cv.width,y:-15-Math.random()*25,vx:(Math.random()-.5)*3.5,vy:2.5+Math.random()*3,w:6+Math.random()*5,h:3+Math.random()*2,rot:Math.random()*360,rv:(Math.random()-.5)*7,c:cols[~~(Math.random()*cols.length)],a:1}));
  if(_raf)cancelAnimationFrame(_raf);
  drawC();
}
function drawC(){
  cx.clearRect(0,0,cv.width,cv.height);let alive=false;
  _parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.a-=.013;if(p.a>0&&p.y<cv.height+20)alive=true;cx.save();cx.globalAlpha=Math.max(0,p.a);cx.translate(p.x,p.y);cx.rotate(p.rot*Math.PI/180);cx.fillStyle=p.c;cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);cx.restore();});
  if(alive)_raf=requestAnimationFrame(drawC);else cx.clearRect(0,0,cv.width,cv.height);
}

// ── init ──
loadRegState();
update();
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>

</body>
